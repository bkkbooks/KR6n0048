front:
  text: 序龍省自瞿曇氏觀星悟道於是廣説經論最後以涅槃妙心囑大迦葉拈華顧要燈燈相續初祖西來唯以直指人心見性成佛為宗旨名曰性宗慈氏菩薩以所悟識心圓明造為瑜伽師地之論天親菩薩攬其淵浩創唯識頌於是護法標首慈恩演傳成唯識論最為精密名曰相宗古杭紹覺老人乃雲棲蓮大師嫡裔也闡釋全文有唯識音義法嗣新伊師廣搜奧旨有合響而我苕聖先法師實為伊公入室弟子重加集注是正有補遺茲三集皆以演釋唯識精義實相宗之寶炬矣或曰萬法唯心心唯一也深究其原則一亦不立今相宗所論心王心所八識輾轉觀所緣緣研極微細得無與直指之道背耶余曰否否夫人心影最難窮也迷心認影一影一心即一世界循環相生何啻萬億無論謬執之輩據幻為真如沉弱水如墮夜霧不可得出即使明悟上智之士於斯道中已契大意稱悟徹而微細無明流注性海慧劒所不能除寶鏡所不能照化雨法雷所不能灑淡震蕩是生死因隨劫輪轉將奈何矣彼慈氏天親悲憫斯苦故造斯論繪寫變相破心影之惑斬八識之根使學者絶後再蘇轉識成智向所謂網羅窠臼皆成安樂窩最勝院妙用神通百法具足然則相宗之旨正所以洞明差別輔性宗如車二轂鳥雙翼何可偏廢哉此唯識補遺之刻深有功於正法眼藏非渺小也刻既成遂書諸簡端康熙戊午孟夏穀旦董漠䇿題
