body:
  text: 第六卷二善位心所三初結前問後巳次舉本顯答頌三末論釋成三初正釋頌文二初總標論次別釋二初釋信等八初釋信二初明正義二初正釋二初略明云次轉釋能次料簡二初簡自相二初問忍次答豈次簡心淨二初問此次答此次斥異解有二釋慚愧二初正釋二初慚云次愧云次料簡三初標會顯揚差次正簡通別二初難簡外宗執通為別若次反難內宗別相同通二初難別相同通二初難崇次釋雖次救通有別義二初救豈次破汝三復通聖教然三釋無貪等二初總明無次別釋二初釋前二二初別釋二初無貪云次無嗔云次通簡善次釋無癡二初正釋云次料簡二初師即慧有次師非慧四初正明有體有二斥前解非若三通前引論然四釋成有體以四釋勤二初略明勤次轉釋二初總表唯善勇次別明差別此五釋輕安安六釋不放逸二初正釋三初略明不次轉釋闕三釋妨雖次料簡二初明防修非此相用二初難豈次釋防次明四法有防修用二初難勤次釋汝七釋行捨二初正釋二初略明云次轉釋謂次簡異由八釋不害二初明正義二初略明云次轉釋謂次斥異解二初敘有次破無次釋及字次料簡別立三諸門分別次釋及字二初正釋所顯欣等二初正明及義及次別釋欣等六初欣等五欣二厭等三厭三不覆等三不四不慢有五不疑有六不散亂等四不次簡示悔等不翻悔次料簡別立二初約立不立義簡二初問何次答二初約相用答相次約偏勝答二初正釋又次釋妨害次約染多淨少簡二初問染次答淨三諸門分別十初假實門此二遍不遍門二初師立四遍七不定遍二初正立有次引證論次師立十遍輕安不遍三初斥前非有次通論意論三申正義二初總釋十一應次別簡輕安二初師有次師有三諸識相應門此四諸受相應門此五別境相應門此六三性相攝門十七三界繫屬門輕八學等相攝門皆九三斷相攝門非十結例餘門餘三根本煩惱三初結前問後如次舉本頌答頌三末論釋成二初正釋頌文二初略釋通名論次廣釋別相六初釋貪云二釋嗔云三釋癡云四釋慢二初正釋體用云次別顯差別此五釋疑二初正釋體用云次別簡體性二初師以慧為體有次師別有自體有六釋惡見二初正釋體用云次別示行相二初標此次釋二初正釋五見五初身見一二邊見二三邪見三四見取四五戒禁取五次通二取妨然次諸門分別次諸門分別十一初俱生分別門二初通判十惑如次別判邊見二初標邊次釋二初師俱生唯斷有次師常亦俱生有二自類相應門二初徵此次釋六初以貪為首對餘八貪二以瞋為首對餘七瞋三以慢為首對餘六慢四以疑為首對五見疑五五見自類不相應五六以癡為首對餘九癡三諸識相應門此四諸受相應門二初徵此次釋二初依實義釋四初貪瞋癡貪二慢二初初師有次次師有三疑後三見疑四身邊二見二初初師有次次師有次隨粗相釋二初惑受對論此次兼界地論貪五別境相應門此六三性相攝門此七界繫現緣門二初徵此次釋三初三界繫屬嗔次三界現起二初明下不起上惑生次明上能起下惑二初正釋生次通妨五三三界相緣二初下惑緣上二初正釋下次通妨而次上惑緣下二初正釋上次通妨下八學等相攝門此九三斷相攝門二初徵此次釋二初簡非所斷非次明見修斷二初總明分次別釋二初約粗相釋唯見所斷二初明十皆頓斷見次廣明迷諦相三初標然次釋二初總迷總次別迷二初總明別次別釋二初二唯迷苦身次八通迷四二初明十總迷苦謂次明八通迷三顯三結迷次依委細釋通修所斷二初標後指前委次釋成修斷二初五別迷苦諦俱次四通迷四諦瞋十隨境立名門三初有事無事煩惱雖次有漏無漏煩惱彼三事境名境煩惱緣十一結例餘門餘四諸隨煩惱三初結前問後巳次舉本頌答頌三末諸釋成二初正釋頌文三初略釋通名二初正釋名論次分類別此次廣釋別相三初小隨十初釋忿云二釋恨云三釋覆二初釋體用云次明分位二初師唯癡攝有次師貪癡攝有四釋惱云五釋嫉云六釋慳云七釋誑云八釋諂云九釋害云十釋憍云次中隨二初正釋二初無慚云次無愧云次通簡三初會通顯揚不次正簡通別二初斥外家執通為別若次示別相皆遍染心不三復會聖教然三大隨八初掉舉二初釋體用云次明等流三初師貪分攝有次師等分攝有三師等流性五初正立有性有二斥初師非非三釋世俗妨而四正立別相掉五斥次師非若二惛沉二初釋體用云次明等流三初師癡分攝有次師等分攝有三師等流性五初正立有性有二通世俗妨隨三正立別相惛四斥次師非若五與癡辨異此三不信二初釋體用云次明等流三初翻信顯相不次正立別相然三簡不忍等由四懈怠二初正明云次簡異於五放逸二初釋體用云次明分位三初正立謂次釋妨雖三指同不放逸推六失念二初釋體用云次明分位有七散亂二初釋體用云次明分位三初師癡分攝有次師等分攝有三師等流性四初正立有體有二正立別相散三斥前師非若四對掉舉簡二初約作用簡二初問掉次答彼次約遍染簡次答或初問染八不正知二初釋體用云次明分位有三釋與并及言次諸門分別三釋與併及言三初顯隨煩惱非唯二十與次簡頌所説唯有二十唯三結示餘染皆此所攝此次諸門分別十二初假實門如二俱生分別門二三自類相應門三初小隨此次中隨中三大隨二初正釋論次通妨有四諸識相應門此五諸受相應門二初依實義釋由次隨粗相釋若六別境相應門如七根本相應門中八三性相攝門小九界攝現緣門三初三界繫屬小次三界現起生三三界相緣中十學等相攝門二十一三斷相攝門二初判後十後次判前十前十二隨境立名門然第七卷五不定心所三初結前問後巳次舉本頌答頌三末論釋成二初正釋頌文三初釋不定通名論次釋悔等別名二初悔眠二初別釋行相二初惡作悔次睡眠眠次通簡體性四初師唯癡分攝有次師癡無癡攝有三師思慧想攝有四師各別有體有次尋伺二初釋體用尋次明分位並三釋二各二言二初標二次釋三初師尋伺各二有次師二種各二有三師顯不定義有次諸門分別十三初假實門四二自類相應門四三諸識相應門二初簡不與七八俱四次明唯與第六俱二初悔眠悔次尋伺二初師亦五識俱有次師唯意識俱四初引論釋成有二釋通妨難捨三復明非五又四通前引論然四諸受相應門有五別境相應門四六信等相應門悔七煩惱相應門悔八隨惑相應門悔九三性相攝門二初總明通三性此次別明通善等二初通善性有次通無記二初二無記後次四無記四十界繫現緣門三初三界繫屬惡次三界現起悔三三界相緣下十一學等相攝門悔十二三斷相攝門二初正明四種通三斷悔次別以尋伺對五法二初師唯分別攝有次師亦正智攝三初正釋有次轉解未三通論雖十三三結例餘門餘次總示二諦二初略問答定即離如次廣問答顯二諦二初難即離二初標失二次釋成二初明離心之過若次明即心之失若次答妙理二初正答二初約王所相望顯二諦二初依世俗以明離心有性二初正明有性應次通前引教以次依勝義以示非即非離此次例諸識相望顯二諦諸次結歎是次明共依等後三門三初結前問後巳次舉本頌答頌三末論釋成三初釋共依門論次釋俱轉門三初法釋二初釋五識隨緣現五次釋或俱或不俱由次喻明如三指廣此三釋起滅分位門二初釋意識常現起二初對諸識通明起不起由次對前五別明常現起又次釋五位亦不行三初正明五位三初標徵五次別釋三初釋無想天報三初正釋無想無次簡識有無三初師常無六識有次師初無後有若三師初後俱有二初正釋有次引證二初引入義顯初非無瑜次引滅義顯初定有決三明所繫地彼次釋二無心定二初略明及次廣釋二初無想定四初正釋定體無二三品修相修三界性等攝此四定所起處二初師唯欲界起有次師欲色界起有次滅盡定四初正釋定體滅二三品修相修三界等所攝此四定所起處二初初起處所此次斷惑方起二初通明三乘二初全斷見起要次分斷修起二初正釋二初師下八地伏七斷欲有次師九地中伏五斷四有次通訪二初難若次釋二初順破答斷次逆彼答雖次別明菩薩二初回心若次直往二初漸悟若次頓悟有三釋睡眠悶絶三初總標無次別釋二初睡眠疫次悶絶風三結屬或三總結除次釋及與言二初問正次答二初師顯生死時有次師顯五無雜三初斥前彼次申正應三通妨此三判通聖凡此次會三能變俱轉示二諦三初總明俱轉是次料簡俱義六初簡示多識俱轉唯一有情二初問若次答二初反詰若次顯正然二簡示多識轉有多等無間緣二初問一次答二初答等無間緣二初順問意答既次奪破唯一又次答多識轉義二初以生緣力齊明諸識俱又二舉心所例明異類並起又三復約譬喻顯多識俱轉又四以同時意識辨與五俱又三簡示一同時意識緣境容多二初問如次答如四簡示諸識同類不俱二初問何次答於五簡示同時意識應有二初問若次答五六簡示諸識不相應二初問多次答非三結示二諦三初正示八次簡非如三引證如次九行頌廣釋外難顯唯識四初釋我法難三初結前問後巳次舉本頌答頌三末論釋成二初正釋頌文二初約相見分釋論次約似我法釋或次釋小乘難九初唯識所因難二初略問答由次廣釋義二初復問雖次廣答二初教理別明二初引教二初正引三初引五經如次引四智三初標又次釋四初相違識相智一二無所緣識智二三自應無倒智三四隨三智轉智四三結菩三引一頌又次總結此次顯理二初正顯二初總能緣顯親相分二初前五極次後三餘次明所緣不離心體二初親所緣緣此次疏所緣緣所次總結此次結勸總證二初勸信故次引證二初正引慈次簡示此二世事乖宗難二初難若次釋如三聖教相違難二初難何次釋依四唯識成空難二初難此次釋非五色相非心難二初難若次釋二初正釋名次引證如六現量違宗難二初難色次釋現七夢覺相違難二初難若次釋如八外取他心難二初難外次釋誰九異境非識難二初略問答二初難既次釋奇次復問答二初難不次釋三初斥失汝次正釋故三勸信若二釋分別難三釋生死難四釋三性難二釋分別難三初外人申難若次舉本頌答頌三末論釋成二初略釋頌文二初染種現生染分別二初別釋句義四初釋第一句三初明四果種二初出所有論次明所除除次出種識體此三簡示種識種二釋第二句此三釋第三句展四釋第四句即次示頌答意此次淨種現生淨分別諸次廣釋頌義二初徵所次釋二初正釋緣生三初且明四緣二初標緣次釋四初因緣二初標列一次釋義二初正釋二初種子種次現行現次簡示現二等無間緣二初正釋體用二初正釋二次料簡三初遮俱轉多次簡相應心三簡無餘二初正簡入次引證云次對識歷明四初對第八三初正約界地明互為緣即次約漏無漏等辨為緣有三別示無漏初起界地二初問此次釋二初標起或次釋成二初頓悟菩薩謂次回心菩薩二初師唯欲界後二次師亦通色界有二對第七二初約界地等明互為緣第次別示無漏所起界地此三對第六二初約界地等明互為緣第次別示無漏所起界地初四對前五二初約界地等明互為緣眼次別唯無漏唯從漏起二初師因中漏與無漏互起有次師果上無漏唯從漏起有三所緣緣二初正釋體用三初總明三次別釋二初列此次釋若三結判觀次對識歷明四