body:
  text: 第一卷論題成論主護譯師唐正文大科三初宗前敬敘分二初歸敬述意稽次造論因緣二初通為利生今次別為破執二初破凡夫外道又次破小乘四師復次依教廣成分三初一頌半略答外難略標識相三初末論設問若次本論頌答頌三末論釋成二初釋前三句二初略釋三初釋第一句論次釋第二句彼三釋第三句二初徵如次釋二初正釋二初依相見假說我法彼次由熏習變似我法二初法釋或次喻明如次結判愚次廣釋二初明無實唯似境三初徵答總標云次重徵別釋二初破實我實法不可得二初破實我二初徵如次釋二初正破三初敘破外道小乘我相二初別破二初破六師三計二初敘計諸次破斥三初破勝論數論初次破無慚尼犍中三破獸主遍出後次破小乘三計二初敘計又次破斥三初破即蘊我初次破離蘊我中三破非即離我後次總破三初約思慮有無破又次約作用有無破又三約所緣非緣破又次立量以顯唯識二初顯能所緣是見相又次結示所緣是識變是三結屬我執俱分三初標列然次別釋二初俱生我執三初釋總名俱次釋別相此三示斷位此次分別我執三初釋總名分次釋別相唯三示斷位此三結判二初正判二初判相質有無二初判定有無如次結成前義是次判依遍有無然次引證故次釋妨次破實法次結示心外境非所緣三總結證成次釋假應依實難次釋後三句次二十三頌半廣明識相顯前頌意三後有五頌明修行之位次三釋結施顯分次釋妨二初正釋妨難三初釋憶識等事妨二初難實次釋二初斥非所次顯理然次釋造業受果妨二初難若次釋二初斥非所次顯理然三釋生死涅槃妨二初難我次釋二初斥非所次顯理然次結示唯識由次破實法二初徵答非有如次廣破執相三初正破心外有法二初破外道二初徵外次釋二初約十三家別破五初數論師三初敘執且次破斥七初破現量所得彼二以能所互破又三體應同用破又四破三合成一許五以總別互破又六約變時合不合破二初正破此次遮救不七約無差別破所成又三結非故二勝論師二初敘執勝次破斥二初正破二初明諸句體非實有八初被諸句中常無常彼二以實德二句對破又三破實句中有礙常又四破諸句中無礙法諸五約唯識破諸句又六破大有性彼七破同異性又八破和合句又次顯諸句非現量得二初明諸句非現量境然次顯能緣非現量智又次結非故三自在天等八論二初破大自在二初敘有次破彼次例破餘七餘四二種聲論二初敘有次破彼五順世論師二初敘有次破二初破因微彼次破果色三初破不越因量二初正破又次破救三初破量德合故似粗若次約果如因破若三約因如果破若次破因果同處又三破果體是一又次束成四種總破二初總標然次別破四初數論等二初敘一次破彼二勝論等二初敘二次破彼三無慚等二初敘三次破彼四邪命等二初敘四次破彼次破餘乘次立量以顯唯識三結屬法執俱分次破餘乘二初當彼次釋二初總釋破次別釋三初破色法二初破對無對色二初標列且次別明二初有對色二初明有對非實有二初略明彼次廣釋二初明能成極微不實二初約質礙有無破謂次約方分有無破二初破有方分又次破無方分二初且約有方分破無方分三初約所成果色破若次約因能成果破又三約果色即因破執次結歸有方分破其實有有次結所成果色非實有故次明有對唯識變二初徵五次釋二初正釋二初總釋依緣雖次別釋依緣二初略明所依然次廣釋所緣二初總標所緣緣有無此次別明所緣緣有無二初明外所緣緣非有二初破執四初破正量部計能生二初敘計謂次破斥非二破經部師計和合二初敘計眼次破斥非三破經部轉計極微非四破薩婆多計和集二初敘計有次破斥彼次結況許次顯內所緣緣非無二初明識變似色等為所緣緣由次明識所變相非極微成二初正明然次釋妨為次結示由次無對色餘次破表無表色次破不相應行三破無為法次破表無表色二初徵表次釋二初明二色非實有二初正明二初釋有表二初身表二初破實有三初反徵此次正破三初破形若次破動若三破心所引生若三結示故次申正義然次語表二初破實有語次申正義然次釋無表二初破實有表次申正義然次釋難二初難世次釋二初總答非色不次別明業體二初明思為三業體能次轉釋身語二業二初示由思名業道起次明業道是假說或次結二色唯識變由次破不相應行三初總明無實體用二初明依色心分位假立不次立量以顯無實體用此次別破得非得等六初破得非得二初破他非二初徵答實有二初論主問且次外人答契次正破實有二初依經總非經次就義別破二初正破得二初引經例破亦次約二因破三初徵又次破二初破能起因若次破不失因若三結故次例破非得得次申正義二初明得然次明非得觀二破衆同分二初破他非二初徵答實有二初論主問復次外人答契次正破實有二初依經總非此次就義別破二初約同智言因破若次約同事欲因破若次申正義然三破命根二初破他非二初徵答實有二初論主問復次外人答若次正破實有二初依經總非此次就義別破三初例破又次釋妨若三結示此次申正義然四破無心定等二初破他非二初徵答實有二初論主問復次外人答若次正破實有若次申正義二初正釋二初無心定謂次無想果無次結示故五破三有為相六破名句文身三傍破執隨眠等第二卷五破三有為相二初破他非二初徵答實有二初論主問復次外人答契次正破實有二初依經總非此次就義別破五初破能相所相體異非二破生等相體俱有又三破能所相本有能四破能相合所相所五破生等三世相違又次申正義二初剎那四相三初標立相意然次釋成四相四初列說四相本二約世簡小前三釋通外難如四述相所表生三結成是假故次一期四相一六破名句文身二初破他非二初徵答實有二初論主問復次外人答契次正破實有二初依經總非此次就義別破二初正破二師二初單破正理論師二初破名等異聲實有若次破聲能生名句文二初正破謂次遮救二初遮音韻即名等異聲實有若次遮音韻非能詮須生名等若次雙破經部正理二初正破聲次結責何次結成愚智語次申正義四初顯假差別然二顯三用殊名三明不即不離此四會其相違二初正會相違由次躡蹟會違且三傍破執隨眠等二初正破二初敘執有次破斥彼次例餘執三破無為法二初正破實有二初依理總非諸次約義別破二初正破二初例有為總破二初例破離色心等定有無為且次立量顯無為即色心實性然次約一多別破二初總徵又次別釋二初破體一二初破虗空若次破餘二一次破體多若次例餘二初准前例破餘次立比量破又次顯示正義三初總標然次別釋二初依識變假施設有一次依法性假施設有二初示法性名二次出無為體離三結示故次立量以顯唯識二初雙顯二取是相見分外次結示唯識亦是假說諸三結屬法執俱分三初標列然次別釋二初俱生法執三初釋總名俱次釋別相此三明斷位此次分別法執三初釋總名分次釋別相唯三明斷位此三結判二初正判二初判相質有無二初判定有無如次結成前義是次判依遍有無然次引證故次結示心外境非所緣二初明離識我法非所緣緣如次明自心外蘊非所緣緣二初簡異聚王所現次簡同聚心所問三總結證成由次釋假應依實難二初難有次釋二初正釋外難三初總破法喻彼次別破法喻二初破喻二初破依類假說三初正破依次遮救若三結破類次破依實假說三初正破依次遮救若三結破由次破法二初正破假說依真又次結申假說正義由三結難非理是次示假說意然次釋後三句二初結前標數識次釋通別名二初釋三類別名一次釋能變通名二初總標此次別釋二初釋因能變一次釋果能變二初總明二次別釋二初等流果等次異熟果二初正釋異次簡異此次二十三頌半廣明識相顯前頌意二初十四行半頌明三能變識相二初廣釋三能變相三初初能變相三初末論設問雖次舉本頌答頌三末論釋成二初正釋頌文八初自相等三門二初正釋三門二初別釋三初自相門論次果相門此三因相門此次總結初次重明因相三初標一次解四初明種子相二初正釋二初正示種相此次明種實有二初正釋雖次釋妨二初難此次釋二初正釋若次簡別然次結判二初判屬相分種次判屬三性二初正判諸次釋妨二初難若次釋雖二明本新義三初淨月等師唯立本有三初釋義此次引證二初引教如次引理又三結示如次難陀等師唯立新熏三初釋義有次引證二初引教如次引理二初證有漏又次證無漏無三會違二初會本有五種性別三初標有次釋即三結故次會地獄成就三根所三護法正義新本合論三初正釋二類二初標有次釋二初本有一次始起二次斥前互闕二初破淨月唯本有二初正破二初明違理二初約因緣義破不從熏生三初標若次釋二初引證如次引論攝三結唯次約因緣義破由熏增長非次明違教又次結責故次破難陀唯新熏二初正破二初明違理二初正明違理二初斥非二初約有為無漏無因破若次遮性淨為無漏生因三初出彼所憑分次破彼謬解二初徵而次破三初破以空理為無漏因若次破以即心為無漏因若三破有漏心性是無漏二初以有漏例無漏若次以異生例聖者二初正例又次破救若三申經正義然次顯正由次通前所引四初通內種定有熏習諸二通無漏由聞熏習二初明亦熏本無漏種其次判二性為緣亦異聞三通依障建立種性二初正釋依次通妨然四通三根依當可生既次明違教然次結責故三結示正義由三明種子義四明熏習義三結二不可知等三門三相應門四受俱門五三性門六心所例王門七因果譬喻門八伏斷位次門次證有本識次第二能變三第三能變次會三能變俱轉示二諦次九行頌廣釋外難顯唯識三明種子義三初明內種三初總標然次別釋六初剎那滅一二果俱有二三恆隨轉三四性決定四五待衆緣五六引自果六三結示唯次明外種外三簡熏習內四明熏習義三初總標二初問依次答所次別釋二初所熏三初徵何次釋四初堅住性一二無記性二三可熏性三四與能熏和合四三結唯次能熏三初徵何次釋四初有生滅一二有勝用二三有增減三四與所熏和合四三結唯三結判二初結熏習如次判因果二初約種現判因果同時能次約三類判因果橫竪二初正判三類能次結屬因緣此三結是二不可知等三門二初徵答總標此次別釋三門二初釋行相所緣二初略釋二初明行相了次明所緣二初別明執受處二初釋處處次釋執受執次總結是所緣執次廣釋二初釋行相三初略指是異熟見分此次通明心心所分量三初難陀立二分二初正明立二分二初正釋二初釋二初明心心所各有二分然次破安慧唯立自證分二初破無所緣若次破無能緣若次結故次引證如次大小乘辨異二初明小乘偏義二初明行相所緣執次明王所問異心次申大乘正說二初明行相所緣違次明王所同異心次陳那立三分二初正釋然次引證如三護法立四分二初正明應有四分二初正釋又次結判二初正判此次引證是次攝歸唯是一心二初明攝如次引證如三結歸是異熟見分故次釋所緣二初正明所變二初明唯變處等二初正釋二初明業力所變決定三初器界二初正明共中共變二初釋義二初正釋所次釋疑雖次料簡二初徵誰次釋三初月藏